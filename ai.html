<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Score Keeper</title>
    <style>
        body {
            background-color: #e8f5e9;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            background-color: #2e7d32;
            color: white;
            padding: 20px;
            margin: 0 0 20px 0;
            font-size: 32px;
        }

        .back-link {
            display: block;
            margin-bottom: 20px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .name-inputs {
            background-color: white;
            border: 3px solid #2e7d32;
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        .name-inputs h3 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        .name-inputs input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #2e7d32;
            border-radius: 8px;
            margin: 8px;
            width: 180px;
        }

        .name-inputs button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .name-inputs button:hover {
            background-color: #1b5e20;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .player-card {
            border: 3px solid #2e7d32;
            border-radius: 12px;
            padding: 30px 40px;
            width: 250px;
        }

        .player-card.player1 {
            background-color: #fce4ec;
        }

        .player-card.player2 {
            background-color: white;
        }

        .player-name {
            font-size: 22px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .score {
            font-size: 80px;
            font-weight: bold;
            color: #333;
            line-height: 1;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            width: 100%;
        }

        .btn:hover {
            background-color: #1b5e20;
        }

        .btn-minus {
            background-color: #f48fb1;
            color: white;
        }

        .btn-minus:hover {
            background-color: #e91e63;
        }

        .sets {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
        }

        .reset-btn {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background-color: #1b5e20;
        }

        .winner-message {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32;
            background-color: #fce4ec;
            border: 3px solid #2e7d32;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎾 Tennis Score Keeper</h1>
    <a class="back-link" href="fromScratch.html">← Back to Tennis Page</a>

    <!-- Name Input Section -->
    <div class="name-inputs">
        <h3>Enter Player Names</h3>
        <input type="text" id="name1input" placeholder="Player 1 Name" />
        <input type="text" id="name2input" placeholder="Player 2 Name" />
        <br>
        <button onclick="setNames()">Start Match</button>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">

        <!-- Player 1 -->
        <div class="player-card player1">
            <div class="player-name" id="name1">Player 1</div>
            <div class="sets">Sets: <span id="sets1">0</span></div>
            <div class="score" id="score1">0</div>
            <button class="btn" onclick="addPoint(1)">+ Point</button>
            <button class="btn btn-minus" onclick="removePoint(1)">− Point</button>
            <button class="btn" onclick="addSet(1)">+ Set</button>
        </div>

        <!-- Player 2 -->
        <div class="player-card player2">
            <div class="player-name" id="name2">Player 2</div>
            <div class="sets">Sets: <span id="sets2">0</span></div>
            <div class="score" id="score2">0</div>
            <button class="btn" onclick="addPoint(2)">+ Point</button>
            <button class="btn btn-minus" onclick="removePoint(2)">− Point</button>
            <button class="btn" onclick="addSet(2)">+ Set</button>
        </div>

    </div>

    <!-- Winner Message -->
    <div class="winner-message" id="winner-message"></div>

    <!-- Reset Button -->
    <button class="reset-btn" onclick="resetScore()">🔄 Reset Score</button>

    <script>
        const points = [0, 15, 30, 40];
        let p1Index = 0;
        let p2Index = 0;
        let p1Sets = 0;
        let p2Sets = 0;

        function setNames() {
            var name1 = document.getElementById('name1input').value;
            var name2 = document.getElementById('name2input').value;
            if (name1 !== '') {
                document.getElementById('name1').textContent = name1;
            }
            if (name2 !== '') {
                document.getElementById('name2').textContent = name2;
            }
        }

        function addPoint(player) {
            if (player === 1) {
                if (p1Index === 3) {
                    wonGame(1);
                } else {
                    p1Index++;
                }
            } else {
                if (p2Index === 3) {
                    wonGame(2);
                } else {
                    p2Index++;
                }
            }
            updateDisplay();
        }

        function removePoint(player) {
            if (player === 1 && p1Index > 0) {
                p1Index--;
            } else if (player === 2 && p2Index > 0) {
                p2Index--;
            }
            updateDisplay();
        }

        function addSet(player) {
            if (player === 1) {
                p1Sets++;
            } else {
                p2Sets++;
            }
            document.getElementById('sets1').textContent = p1Sets;
            document.getElementById('sets2').textContent = p2Sets;
            p1Index = 0;
            p2Index = 0;
            updateDisplay();
            checkSetWinner();
        }

        function wonGame(player) {
            if (player === 1) {
                p1Sets++;
            } else {
                p2Sets++;
            }
            document.getElementById('sets1').textContent = p1Sets;
            document.getElementById('sets2').textContent = p2Sets;
            p1Index = 0;
            p2Index = 0;
            checkSetWinner();
        }

        function checkSetWinner() {
            var name1 = document.getElementById('name1').textContent;
            var name2 = document.getElementById('name2').textContent;
            var msg = document.getElementById('winner-message');
            if (p1Sets >= 3) {
                msg.textContent = '🏆 ' + name1 + ' Wins the Match!';
                msg.style.display = 'block';
            } else if (p2Sets >= 3) {
                msg.textContent = '🏆 ' + name2 + ' Wins the Match!';
                msg.style.display = 'block';
            }
        }

        function updateDisplay() {
            var p1Score = p1Index === 3 && p2Index === 3 ? 'Ad' : points[p1Index];
            var p2Score = p2Index === 3 && p1Index === 3 ? 'Ad' : points[p2Index];
            document.getElementById('score1').textContent = p1Score;
            document.getElementById('score2').textContent = p2Score;
        }

        function resetScore() {
            p1Index = 0;
            p2Index = 0;
            p1Sets = 0;
            p2Sets = 0;
            document.getElementById('sets1').textContent = 0;
            document.getElementById('sets2').textContent = 0;
            document.getElementById('winner-message').style.display = 'none';
            updateDisplay();
        }
    </script>

</body>
</html>
